services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: ikhwezi-backend-prod
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_KEY=${ADMIN_KEY}
      - RTMP_SERVER=${RTMP_SERVER:-rtmp://nginx-rtmp-prod:1935/live}
      - HLS_URL=${HLS_URL:-http://localhost:8081/hls}
      - LOG_LEVEL=info
    volumes:
      - backend-storage-prod:/app/storage
      - backend-logs-prod:/app/logs
    depends_on:
      - nginx-rtmp
    restart: always
    networks:
      - ikhwezi-network-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${FRONTEND_URL:-http://localhost:8080}
    container_name: ikhwezi-frontend-prod
    ports:
      - "8080:80"
    depends_on:
      - backend
      - nginx-rtmp
    restart: always
    networks:
      - ikhwezi-network-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  nginx-rtmp:
    image: tiangolo/nginx-rtmp:latest
    container_name: ikhwezi-rtmp-prod
    ports:
      - "1935:1935"
      - "8081:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - hls-storage-prod:/tmp/hls
    restart: always
    networks:
      - ikhwezi-network-prod
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1935"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Optional: Reverse Proxy for SSL/TLS termination
  # Uncomment and configure for production HTTPS
  # nginx-proxy:
  #   image: nginx:alpine
  #   container_name: ikhwezi-proxy-prod
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/proxy.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl/:/etc/nginx/ssl/:ro
  #   depends_on:
  #     - frontend
  #     - backend
  #   restart: always
  #   networks:
  #     - ikhwezi-network-prod

volumes:
  backend-storage-prod:
    driver: local
  backend-logs-prod:
    driver: local
  hls-storage-prod:
    driver: local

networks:
  ikhwezi-network-prod:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-ikhwezi-prod
