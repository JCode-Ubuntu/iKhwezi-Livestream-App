worker_processes auto;
rtmp_auto_push on;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        
        application live {
            live on;
            record off;
            
            hls on;
            hls_path /tmp/hls;
            hls_fragment 3;
            hls_playlist_length 60;
            hls_cleanup on;
            
            # Auto-notify backend when OBS starts/stops streaming
            on_publish http://ikhwezi-backend:3001/api/live/on-publish;
            on_publish_done http://ikhwezi-backend:3001/api/live/on-publish-done;
            
            deny play all;
        }
    }
}

http {
    sendfile on;
    tcp_nopush on;
    default_type application/octet-stream;

    server {
        listen 8080;
        
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            
            root /tmp;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
                add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
            
            add_header Cache-Control no-cache always;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
        }
        
        location /stat {
            rtmp_stat all;
        }
        
        location /control {
            rtmp_control all;
        }

        # Prevent noisy 404 logs for unrelated paths (e.g. /admin).
        location / {
            return 404;
        }
    }
}
