services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ikhwezi-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=ikhwezi_jwt_secret_2026_super_secure
      - ADMIN_KEY=ikhwezi_admin_26
      - RTMP_SERVER=rtmp://nginx-rtmp:1935/live
      - HLS_URL=https://ikhwezi.site/hls
    volumes:
      - backend-storage:/app/storage
    depends_on:
      - nginx-rtmp
    restart: unless-stopped
    networks:
      - ikhwezi-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ikhwezi-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
      - nginx-rtmp
    restart: unless-stopped
    networks:
      - ikhwezi-network

  nginx-rtmp:
    image: tiangolo/nginx-rtmp:latest
    container_name: ikhwezi-rtmp
    ports:
      - "1935:1935"
      - "8081:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - hls-storage:/tmp/hls
    restart: unless-stopped
    networks:
      - ikhwezi-network

volumes:
  backend-storage:
  hls-storage:

networks:
  ikhwezi-network:
    driver: bridge
